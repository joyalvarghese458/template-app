<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Joyal portfolio preview</title>
  <desc id="desc">A preview styled to match the real Joyal portfolio hero with dark gradients, neon title text, resume and contact buttons, and social icons.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1728" />
      <stop offset="42%" stop-color="#162551" />
      <stop offset="74%" stop-color="#221f58" />
      <stop offset="100%" stop-color="#2c0f4c" />
    </linearGradient>
    <linearGradient id="heroGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f77ff" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#6e2dff" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c72ff" />
      <stop offset="100%" stop-color="#20d8ff" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1600" rx="52" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="170" fill="#111a2a" />
  <rect x="0" y="170" width="1200" height="1430" fill="url(#bg)" />

  <circle cx="220" cy="490" r="340" fill="#2d6cff" fill-opacity="0.10" />
  <circle cx="980" cy="1270" r="320" fill="#8a2eff" fill-opacity="0.12" />
  <rect x="0" y="170" width="1200" height="1430" fill="url(#heroGlow)" />

  <g opacity="0.14" stroke="#89a7ff" stroke-width="6">
    <path d="M40 880 L420 720 L760 900 L1160 690" />
    <path d="M20 980 L360 820 L720 1000 L1180 800" />
    <path d="M0 1080 L300 940 L660 1110 L1130 900" />
    <path d="M0 1180 L250 1050 L620 1210 L1090 1000" />
    <path d="M20 1280 L290 1160 L600 1310 L1060 1110" />
    <path d="M60 1380 L320 1260 L630 1410 L1030 1230" />
  </g>

  <g transform="translate(48 52)">
    <rect width="98" height="98" rx="24" fill="url(#accent)" />
    <text x="30" y="66" fill="#111a2a" font-family="Arial, sans-serif" font-size="44" font-weight="700">J</text>
    <text x="126" y="63" fill="#7c72ff" font-family="Arial, sans-serif" font-size="44" font-weight="700">Joyal</text>
  </g>

  <g transform="translate(1040 62)" fill="#ffffff">
    <rect x="0" y="0" width="78" height="78" rx="18" fill="#182235" fill-opacity="0.6" />
    <rect x="22" y="24" width="34" height="4" rx="2" />
    <rect x="22" y="36" width="34" height="4" rx="2" />
    <rect x="22" y="48" width="34" height="4" rx="2" />
  </g>

  <g text-anchor="middle">
    <text x="600" y="505" fill="#31f0ff" font-family="Arial, sans-serif" font-size="64" font-weight="700">Hi, I'm</text>
    <text x="600" y="645" fill="#ffffff" font-family="Arial, sans-serif" font-size="118" font-weight="800">Joyal Varghese</text>
    <text x="600" y="770" fill="url(#accent)" font-family="Arial, sans-serif" font-size="88" font-weight="800">Full-Stack Developer</text>
  </g>

  <g fill="#d6deef" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">
    <text x="600" y="910">Building scalable web applications with</text>
    <text x="600" y="978">React, Node.js, and PostgreSQL.</text>
    <text x="600" y="1060">Transforming ideas into elegant,</text>
    <text x="600" y="1128">efficient solutions.</text>
  </g>

  <g transform="translate(255 1188)">
    <rect width="690" height="154" rx="34" fill="url(#accent)" filter="url(#softGlow)" />
    <g transform="translate(118 54)" fill="#ffffff">
      <path d="M16 0h13l-4 14h14l-20 26 5-17H10z" />
      <path d="M48 8h4v23h24v4H48z" />
      <path d="M52 37 37 23l3-3 12 10 22-22 3 3z" />
    </g>
    <text x="382" y="95" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="700" text-anchor="middle">View Resume</text>
  </g>

  <g transform="translate(275 1378)">
    <rect width="650" height="152" rx="32" fill="none" stroke="#5ab8ff" stroke-width="8" />
    <g transform="translate(133 55)" stroke="#5ab8ff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="46" height="32" rx="4" />
      <path d="M4 4 23 19 42 4" />
    </g>
    <text x="358" y="94" fill="#39a8ff" font-family="Arial, sans-serif" font-size="54" font-weight="700" text-anchor="middle">Contact Me</text>
  </g>

  <g transform="translate(365 1538)">
    <g transform="translate(0 0)">
      <circle cx="0" cy="0" r="62" fill="#1a2436" stroke="#34445f" stroke-width="4" />
      <circle cx="-18" cy="-4" r="7" fill="#ffffff" />
      <circle cx="0" cy="-4" r="7" fill="#ffffff" />
      <circle cx="-18" cy="15" r="7" fill="#ffffff" />
      <path d="M2 -18h10v48H2z" fill="#ffffff" />
      <rect x="16" y="2" width="26" height="26" fill="#ffffff" />
    </g>
    <g transform="translate(235 0)">
      <circle cx="0" cy="0" r="62" fill="#1a2436" stroke="#34445f" stroke-width="4" />
      <rect x="-26" y="-18" width="52" height="36" rx="4" fill="none" stroke="#ffffff" stroke-width="6" />
      <path d="M-22 -14 0 4 22 -14" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <g transform="translate(470 0)">
      <circle cx="0" cy="0" r="62" fill="#1a2436" stroke="#34445f" stroke-width="4" />
      <path d="M-18 16c-22 6-22-10-31-13m62 26v-15c0-5-.5-8-2-12 8-9 7-20 3-28 0 0-7-2-23 8a78 78 0 0 0-42 0c-16-10-23-8-23-8-4 8-5 19 3 28-2 4-3 7-3 12v15m0 0c-22 6-22-10-31-13m31 13h62" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
